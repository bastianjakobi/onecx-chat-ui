<form [formGroup]="chatForm"
      (ngSubmit)="onSubmit()"
      class="new-chat-wrapper flex flex-column h-full bg-white p-3">

  <!-- Shared Settings (ALWAYS visible - used by all chat types) -->
  <app-shared-chat-settings
    [form]="chatForm"
  ></app-shared-chat-settings>

  <!-- Type-Specific Settings (conditional based on chat mode) -->
  @if (settingsType === ChatType.HumanDirectChat) {
    <app-direct-chat-settings [form]="chatForm"></app-direct-chat-settings>
  }

  @if (settingsType === ChatType.HumanGroupChat) {
    <app-group-chat-settings [form]="chatForm"></app-group-chat-settings>
  }

  <!-- Spacer -->
  <div class="flex-grow-1"></div>

  <!-- Button Bar -->
  @if (mode === 'edit') {
    <div class="btn-bar flex justify-content-between align-items-center p-3">
      <p-button
        type="button"
        data-testid="delete-chat-button"
        [label]="'CHAT.ACTIONS.DELETE' | translate"
        severity="danger"
        [outlined]="true"
        (onClick)="onDeleteChat()"
      />
      <p-button
        type="submit"
        data-testid="submit-chat-button"
        [label]="'CHAT.ACTIONS.SAVE' | translate"
        [outlined]="true"
        severity="contrast"
        [disabled]="chatForm.invalid"
      />
    </div>
  } @else {
    <div class="btn-bar flex justify-content-end p-3">
      <p-button
        type="submit"
        data-testid="submit-chat-button"
        [label]="'CHAT.ACTIONS.CREATE' | translate"
        [outlined]="true"
        severity="contrast"
        [disabled]="chatForm.invalid"
      />
    </div>
  }
</form>
